<!-- MODAL -->
<div id="modal">

  <span class="close" onclick="closeModal()">×</span>

  <button class="nav left" onclick="event.stopPropagation(); prevImg()">‹</button>

  <div class="modal-content" onclick="event.stopPropagation()">
    <img id="modalImg">

    <div class="modal-info">
      <h3 id="modalTitle"></h3>
      <p id="modalPrice"></p>
      <p class="extra">Papel Fujicolor Profesional</p>
    </div>
  </div>

  <button class="nav right" onclick="event.stopPropagation(); nextImg()">›</button>

</div>

<!-- SCRIPT ÚNICO CORREGIDO -->
<script>

let currentIndex = 0;

const images = Array.from(document.querySelectorAll(".card img"));

function openModal(index){
  currentIndex = index;
  updateModal();
  document.getElementById("modal").style.display = "flex";
}

function updateModal(){
  const img = images[currentIndex];

  document.getElementById("modalImg").src = img.src;

  const card = img.closest(".card");
  document.getElementById("modalTitle").innerText = card.dataset.title;
  document.getElementById("modalPrice").innerText = card.dataset.price;
}

function closeModal(){
  document.getElementById("modal").style.display = "none";
}

function nextImg(){
  currentIndex = (currentIndex + 1) % images.length;
  updateModal();
}

function prevImg(){
  currentIndex = (currentIndex - 1 + images.length) % images.length;
  updateModal();
}

/* click fuera cierra */
document.getElementById("modal").addEventListener("click", closeModal);

/* SWIPE MOBILE */
let startX = 0;

document.getElementById("modal").addEventListener("touchstart", e=>{
  startX = e.touches[0].clientX;
});

document.getElementById("modal").addEventListener("touchend", e=>{
  let endX = e.changedTouches[0].clientX;

  if(startX - endX > 50){
    nextImg();
  }

  if(endX - startX > 50){
    prevImg();
  }
});

</script>
