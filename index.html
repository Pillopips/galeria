<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Fotografía</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css"/>

<style>
body{
  margin:0;
  font-family:"Poppins", sans-serif;
  background:#fafafa;
  color:#111;
}

/* HEADER */
.header{
  padding:70px 70px 10px;
  text-align:center;
}

.title-block h1{
  margin:0;
  font-size:30px;
  font-weight:800;
}

.title-block p{
  font-size:14px;
  color:#777;
}

.ig-link{
  font-size:13px;
  text-decoration:none;
  border-bottom:1px solid #ddd;
  color:#111;
}

/* GALLERY */
.gallery{
  max-width:950px;
  margin:0 auto;
  padding:20px 30px 80px;
}

.card{
  margin-bottom:60px;
}

.img-wrap{
  position:relative;
  overflow:hidden;
  border-radius:10px;
}

.img-wrap img{
  width:100%;
  display:block;
  cursor:pointer;
  transition:transform .3s ease;
}

.img-wrap:hover img{
  transform:scale(1.03);
}

/* MODAL */
#modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.92);
  justify-content:center;
  align-items:center;
  z-index:9999;
}

#modalImg{
  max-width:90%;
  max-height:80vh;
  object-fit:contain;
  will-change:transform;
}

.modal-info{
  color:#fff;
  text-align:center;
  margin-top:15px;
}

.close{
  position:absolute;
  top:20px;
  right:25px;
  font-size:35px;
  color:#fff;
  cursor:pointer;
}

.nav{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  font-size:40px;
  color:#fff;
  background:none;
  border:none;
  cursor:pointer;
}

.nav.left{ left:10px; }
.nav.right{ right:10px; }

</style>
</head>

<body>

<!-- MODAL -->
<div id="modal">

  <span class="close" onclick="closeModal()">×</span>

  <button class="nav left" onclick="event.stopPropagation(); prevImg()">‹</button>

  <div style="text-align:center" onclick="event.stopPropagation()">
    <img id="modalImg">
    <div class="modal-info">
      <h3 id="modalTitle"></h3>
      <p id="modalPrice"></p>
    </div>
  </div>

  <button class="nav right" onclick="event.stopPropagation(); nextImg()">›</button>

</div>

<!-- MODAL -->
<div id="modal">

  <span class="close" onclick="closeModal()">×</span>

  <button class="nav left" onclick="event.stopPropagation(); prevImg()">‹</button>

  <div style="text-align:center" onclick="event.stopPropagation()">
    <img id="modalImg">
    <div class="modal-info">
      <h3 id="modalTitle"></h3>
      <p id="modalPrice"></p>
    </div>
  </div>

  <button class="nav right" onclick="event.stopPropagation(); nextImg()">›</button>

</div>

<script>

let currentIndex = 0;
const images = Array.from(document.querySelectorAll(".card img"));

const modal = document.getElementById("modal");
const modalImg = document.getElementById("modalImg");

let startX = 0;
let dragging = false;

function openModal(index){
  currentIndex = index;
  showImage(0);
  modal.style.display = "flex";
}

function showImage(dir){

  modalImg.style.transition = "none";
  modalImg.style.transform = `translateX(${dir * 60}px) scale(0.98)`;
  modalImg.style.opacity = "0.6";

  setTimeout(() => {

    const img = images[currentIndex];

    modalImg.src = img.src;

    const card = img.closest(".card");
    document.getElementById("modalTitle").innerText = card.dataset.title;
    document.getElementById("modalPrice").innerText = card.dataset.price;

    modalImg.style.transition = "transform .35s ease, opacity .35s ease";
    modalImg.style.transform = "translateX(0px) scale(1)";
    modalImg.style.opacity = "1";

  }, 60);
}

function closeModal(){
  modal.style.display = "none";
}

function nextImg(){
  currentIndex = (currentIndex + 1) % images.length;
  showImage(1);
}

function prevImg(){
  currentIndex = (currentIndex - 1 + images.length) % images.length;
  showImage(-1);
}

/* CLICK FUERA */
modal.addEventListener("click", closeModal);

/* SWIPE CON INERCIA VISUAL */
modal.addEventListener("touchstart", e=>{
  startX = e.touches[0].clientX;
  dragging = true;
});

modal.addEventListener("touchmove", e=>{
  if(!dragging) return;

  let x = e.touches[0].clientX;
  let diff = x - startX;

  modalImg.style.transition = "none";
  modalImg.style.transform = `translateX(${diff}px) scale(${1 - Math.abs(diff)/1200})`;
});

modal.addEventListener("touchend", e=>{
  dragging = false;

  let endX = e.changedTouches[0].clientX;
  let diff = endX - startX;

  if(diff < -50){
    nextImg();
  } else if(diff > 50){
    prevImg();
  } else {
    modalImg.style.transition = "transform .3s ease";
    modalImg.style.transform = "translateX(0px) scale(1)";
  }
});

</script>

</body>
</html>
